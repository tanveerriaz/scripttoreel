script_generation:
  system: |
    You are a professional video scriptwriter specializing in engaging short-form documentary content.
    Your scripts are vivid, atmospheric, and perfectly timed for voiceover narration.
    Always respond with valid JSON only — no markdown, no extra text.

  user_template: |
    Write a {duration}-minute video script about: "{topic}"

    Return a JSON object with this exact structure (replace example values with real ones):
    {{
      "title": "Video title",
      "topic": "{topic}",
      "duration_sec": {duration_sec},
      "mood": "educational",
      "visual_style": "documentary",
      "color_palette": ["#1a1a2e", "#16213e", "#0f3460"],
      "segments": [
        {{
          "id": 1,
          "type": "intro",
          "text": "Voiceover narration text here...",
          "duration_sec": 8,
          "visual_cues": ["futuristic interface", "glowing network", "digital world"],
          "mood_tags": ["dramatic", "atmospheric"],
          "b_roll_keywords": ["artificial intelligence", "technology", "future"],
          "sfx_cues": ["ambient hum"],
          "music_cues": ["ambient drone"],
          "transitions": {{
            "in": "fade_in",
            "out": "dissolve"
          }},
          "text_overlay": {{
            "enabled": true,
            "text": "The Rise of Agentic AI",
            "position": "bottom_third",
            "style": "lower_third",
            "start_time": 0.0
          }}
        }}
      ],
      "background_music_style": "ambient",
      "overall_pacing": "medium"
    }}

    IMPORTANT RULES:
    - mood must be exactly one of: dark, mysterious, uplifting, dramatic, educational, horror, neutral, suspenseful, melancholic
    - type must be exactly one of: intro, narration, transition, outro
    - background_music_style must be exactly one of: ambient, dramatic, uplifting, suspenseful
    - overall_pacing must be exactly one of: slow, medium, fast
    - Use ONLY valid JSON — no comments, no trailing commas, no pipe characters

    Requirements:
    - Total duration of all segments must equal {duration_sec} seconds
    - Create 3-5 natural segments (keep it concise for short videos)
    - First segment is always "intro" with text overlay enabled
    - Last segment is always "outro"
    - Visual cues must be specific and searchable as stock footage terms
    - Make the narration atmospheric and engaging

asset_search_keywords:
  system: |
    You are a stock footage researcher. Given a video topic, generate search keywords
    that will find the best matching stock footage, images, and audio.
    Return valid JSON only.

  user_template: |
    Generate stock asset search keywords for a video about: "{topic}"
    Mood: {mood}

    Return JSON:
    {{
      "primary_keywords": ["keyword1", "keyword2"],
      "video_searches": ["search phrase 1", "search phrase 2"],
      "image_searches": ["search phrase 1", "search phrase 2"],
      "audio_searches": ["ambient sound 1", "sfx 1"],
      "negative_keywords": ["exclude1", "exclude2"]
    }}

quality_check:
  system: |
    You are a video quality analyst. Analyze this video metadata and provide feedback.
    Return valid JSON only.
